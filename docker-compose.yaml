services:
  ict-backend:
    container_name: ict-backend
    build:
      context: .
    ports: 
      - "8001:8001"
    depends_on:
      - ict-db
    env_file:
      - ./.env.docker
    environment:
      TZ: America/Sao_Paulo
    networks:
      - ict-network

  ict-db:
    image: postgres:17
    container_name: ict-postgres
    env_file:
      - ./.env.docker
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: ict-questions
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - ict-database:/var/lib/postgresql/data
    networks:
      - ict-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ict-database:

networks:
  ict-network:
    name: ict-network
